<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Política de Crédito — GATEONE</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="main-head">
        <h1>Política de Crédito</h1>
        <p>Defina os critérios usados pelo motor de análise da sua incorporadora.</p>
      </div>

      <div id="msgGlobal" class="msg"></div>

      <form id="formPolitica" class="form card form-card">
        <div class="grid-2">
          <div class="field">
            <label for="scoreMinimo">Score mínimo</label>
            <input id="scoreMinimo" type="number" min="0" max="1000" step="10" required value="400" />
            <span class="hint">Faixa 0–1000. Recomendado: 400.</span>
          </div>
          <div class="field">
            <label for="rendaMinima">Renda mínima (R$)</label>
            <input id="rendaMinima" type="number" min="0" step="100" required value="3000" />
            <span class="hint">Total dos proponentes. Recomendado: R$ 3.000.</span>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="endividamentoMaximo">Endividamento máximo (R$)</label>
            <input id="endividamentoMaximo" type="number" min="0" step="500" required value="30000" />
            <span class="hint">Soma total de dívidas tolerada.</span>
          </div>
          <div class="field">
            <label for="comprometimentoMaximo">Comprometimento máximo (%)</label>
            <input id="comprometimentoMaximo" type="number" min="0" max="100" step="0.5" required value="30" />
            <span class="hint">% da renda que a parcela pode consumir.</span>
          </div>
        </div>

        <div class="field">
          <label for="prazoValidade">Prazo de validade do laudo (dias)</label>
          <input id="prazoValidade" type="number" min="1" max="365" step="1" required value="30" />
          <span class="hint">Tempo que o laudo emitido permanece válido.</span>
        </div>

        <div class="form-actions">
          <button id="btnSalvar" type="submit" class="btn btn-orange">Salvar política</button>
          <a class="btn btn-ghost" href="dashboard.html">Cancelar</a>
        </div>
        <div id="msgForm" class="msg"></div>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="sidebar.js"></script>
  <script>
    window.renderSidebar('politica');
    const supa = window.gateoneSupabase;
    const msgGlobal = document.getElementById('msgGlobal');
    const msgForm = document.getElementById('msgForm');
    let incorp = null;
    let politicaId = null;

    const aviso = (el, t, tipo='err') => { el.textContent = t; el.className = `msg ${tipo} show`; };
    const limparMsg = (el) => { el.className = 'msg'; el.textContent = ''; };

    async function carregar(){
      const { data, error } = await supa
        .from('politicas_credito')
        .select('id, score_minimo, endividamento_maximo, comprometimento_maximo, renda_minima, prazo_validade_dias')
        .eq('incorporadora_id', incorp.id)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();
      if (error) { aviso(msgGlobal, 'Erro ao carregar política: ' + error.message); return; }
      if (!data) return;
      politicaId = data.id;
      document.getElementById('scoreMinimo').value = data.score_minimo;
      document.getElementById('endividamentoMaximo').value = data.endividamento_maximo;
      document.getElementById('comprometimentoMaximo').value = Number(data.comprometimento_maximo) * 100;
      document.getElementById('rendaMinima').value = data.renda_minima;
      document.getElementById('prazoValidade').value = data.prazo_validade_dias;
    }

    (async () => {
      const user = await window.exigirLogin();
      if (!user) return;
      window.preencherUsuarioSidebar(user);
      incorp = await window.buscarIncorporadoraDoUsuario(user);
      if (!incorp) {
        aviso(msgGlobal, 'Sua conta ainda não está vinculada a uma incorporadora. Fale com o suporte GATEONE.');
        document.getElementById('formPolitica').style.display = 'none';
        return;
      }
      await carregar();
    })();

    document.getElementById('formPolitica').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!incorp) return;
      limparMsg(msgForm);

      const payload = {
        incorporadora_id: incorp.id,
        score_minimo: parseInt(document.getElementById('scoreMinimo').value, 10),
        endividamento_maximo: parseFloat(document.getElementById('endividamentoMaximo').value),
        comprometimento_maximo: parseFloat(document.getElementById('comprometimentoMaximo').value) / 100,
        renda_minima: parseFloat(document.getElementById('rendaMinima').value),
        prazo_validade_dias: parseInt(document.getElementById('prazoValidade').value, 10),
      };

      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.textContent = 'Salvando...';

      const resp = politicaId
        ? await supa.from('politicas_credito').update(payload).eq('id', politicaId).select().single()
        : await supa.from('politicas_credito').insert(payload).select().single();

      btn.disabled = false; btn.textContent = 'Salvar política';

      if (resp.error) { aviso(msgForm, 'Erro ao salvar: ' + resp.error.message); return; }
      politicaId = resp.data.id;
      aviso(msgForm, 'Política salva com sucesso.', 'ok');
    });
  </script>
</body>
</html>
