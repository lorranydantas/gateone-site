<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Política de Crédito — GATEONE</title>
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .page-head h1{font-size:1.6rem;line-height:1.1;margin-bottom:4px}
    .page-head p{color:var(--text-muted);font-size:.86rem}

    .pol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .pol-card{
      background:var(--card);border:1px solid var(--line);border-radius:16px;
      padding:20px;display:flex;flex-direction:column;gap:12px;
      transition:box-shadow .15s,border-color .15s;
    }
    .pol-card:hover{box-shadow:var(--shadow-md);border-color:var(--line-strong)}
    .pol-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .pol-card-name{font-size:1rem;font-weight:600;color:var(--text);line-height:1.25}
    .pol-card-rows{display:grid;gap:6px}
    .pol-row{display:flex;justify-content:space-between;font-size:.78rem}
    .pol-row .k{color:var(--text-muted)}
    .pol-row .v{color:var(--text);font-weight:500}
    .pol-card-actions{padding-top:8px;border-top:1px solid var(--line)}
    .pol-card-actions .btn{width:100%;font-size:.82rem}

    .status-badge{
      display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;
      font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
    }
    .status-vendas{background:var(--blue-soft);color:var(--blue)}
    .status-lancamento{background:var(--orange-soft);color:var(--orange)}
    .status-entregue{background:var(--soft);color:var(--text-muted)}

    .pol-config-badge{
      display:inline-flex;align-items:center;gap:4px;
      font-size:.72rem;font-weight:600;
    }
    .pol-config-badge.sim{color:var(--blue)}
    .pol-config-badge.nao{color:var(--text-muted)}

    .empty-state{
      background:var(--card);border:1px dashed var(--line-strong);border-radius:16px;
      padding:48px 24px;text-align:center;color:var(--text-muted);
    }
    .empty-state h3{font-size:1rem;margin-bottom:6px;color:var(--text)}
    .empty-state p{font-size:.86rem;margin-bottom:18px}

    /* Modal */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(6,11,22,.5);
      display:none;align-items:center;justify-content:center;z-index:50;padding:24px;
    }
    .modal-backdrop.show{display:flex}
    .modal{
      background:var(--card);border-radius:18px;width:100%;max-width:640px;
      max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.18);
    }
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
    .modal-head h2{font-size:1.05rem}
    .modal-head .sub{font-size:.78rem;color:var(--text-muted);margin-top:2px}
    .modal-close{background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:4px 8px;border-radius:8px}
    .modal-close:hover{background:var(--soft);color:var(--text)}
    .modal-body{padding:22px 24px;overflow-y:auto;display:grid;gap:14px}
    .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:560px){.row-2{grid-template-columns:1fr}}

    .skeleton{
      background:linear-gradient(90deg,var(--soft) 0%,var(--card-hover) 50%,var(--soft) 100%);
      background-size:200% 100%;animation:shimmer 1.4s infinite;
      border-radius:16px;height:200px;
    }
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>Política de Crédito</h1>
          <p>Defina os critérios usados pelo motor de análise para cada empreendimento.</p>
        </div>
      </div>

      <div id="msgGlobal" class="msg"></div>

      <div id="polGrid" class="pol-grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </main>
  </div>

  <!-- Modal: configurar política do empreendimento -->
  <div class="modal-backdrop" id="modalPol">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2>Política de Crédito</h2>
          <div class="sub" id="modalPolEmp">…</div>
        </div>
        <button class="modal-close" type="button" onclick="fecharModalPol()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="row-2">
          <div class="field">
            <label>Score mínimo</label>
            <input id="fScore" type="number" min="0" max="1000" step="10" value="400" />
            <span class="hint">Faixa 0–1000. Recomendado: 400.</span>
          </div>
          <div class="field">
            <label>Renda mínima (R$)</label>
            <input id="fRenda" type="number" min="0" step="100" value="3000" />
            <span class="hint">Total dos proponentes.</span>
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label>Endividamento máximo (R$)</label>
            <input id="fEndiv" type="number" min="0" step="500" value="30000" />
            <span class="hint">Soma total de dívidas tolerada.</span>
          </div>
          <div class="field">
            <label>Comprometimento máximo (%)</label>
            <input id="fComp" type="number" min="0" max="100" step="0.5" value="30" />
            <span class="hint">% da renda que a parcela pode consumir.</span>
          </div>
        </div>

        <div class="field">
          <label>Prazo de validade do laudo (dias)</label>
          <input id="fPrazo" type="number" min="1" max="365" step="1" value="30" />
          <span class="hint">Tempo que o laudo emitido permanece válido.</span>
        </div>

        <div id="msgPol" class="msg"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" type="button" onclick="fecharModalPol()">Cancelar</button>
        <button class="btn btn-orange" type="button" id="btnSalvarPol">Salvar política</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="sidebar.js"></script>
  <script>
    window.renderSidebar('politica');
    const supa = window.gateoneSupabase;
    const msgGlobal = document.getElementById('msgGlobal');
    const grid = document.getElementById('polGrid');

    let incorp = null;
    let empAtual = null;       // empreendimento sendo configurado no modal
    let politicaAtualId = null; // id da política existente (se houver)

    const aviso = (el, t, tipo='err') => { el.textContent = t; el.className = `msg ${tipo} show`; };
    const limparMsg = (el) => { el.className = 'msg'; el.textContent = ''; };

    const STATUS_CLASS = {
      'Em vendas':   'status-vendas',
      'Lançamento':  'status-lancamento',
      'Entregue':    'status-entregue',
    };

    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    const fmtBR = (n) => n != null ? new Intl.NumberFormat('pt-BR').format(n) : '—';

    async function carregar(){
      // 1. Empreendimentos da incorporadora
      const { data: emps, error: eEmp } = await supa
        .from('empreendimentos')
        .select('id, nome, status')
        .eq('incorporadora_id', incorp.id)
        .order('nome', { ascending: true });
      if (eEmp) { aviso(msgGlobal, 'Erro ao carregar: ' + eEmp.message); grid.innerHTML = ''; return; }

      if (!emps || emps.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <h3>Nenhum empreendimento cadastrado</h3>
            <p>Cadastre seu primeiro empreendimento para configurar políticas de crédito específicas.</p>
            <a class="btn btn-orange" href="empreendimentos.html">Ir para empreendimentos →</a>
          </div>`;
        return;
      }

      // 2. Políticas existentes por empreendimento
      const empIds = emps.map(e => e.id);
      const { data: pols } = await supa
        .from('politicas_credito')
        .select('id, empreendimento_id, score_minimo, renda_minima, endividamento_maximo, comprometimento_maximo, prazo_validade_dias')
        .in('empreendimento_id', empIds);

      const polPorEmp = new Map();
      (pols || []).forEach(p => { polPorEmp.set(p.empreendimento_id, p); });

      grid.innerHTML = emps.map(e => {
        const pol = polPorEmp.get(e.id);
        const config = !!pol;
        return `
          <div class="pol-card">
            <div class="pol-card-head">
              <div class="pol-card-name">${escapeHtml(e.nome)}</div>
              <span class="status-badge ${STATUS_CLASS[e.status] || 'status-vendas'}">${escapeHtml(e.status || '—')}</span>
            </div>
            <div class="pol-card-rows">
              <div class="pol-row">
                <span class="k">Política</span>
                <span class="v">
                  <span class="pol-config-badge ${config ? 'sim' : 'nao'}">
                    ${config ? '● Configurada' : '○ Não configurada'}
                  </span>
                </span>
              </div>
              ${config ? `
                <div class="pol-row"><span class="k">Score mín</span><span class="v">${fmtBR(pol.score_minimo)}</span></div>
                <div class="pol-row"><span class="k">Renda mín</span><span class="v">R$ ${fmtBR(pol.renda_minima)}</span></div>
                <div class="pol-row"><span class="k">Comprom. máx</span><span class="v">${(Number(pol.comprometimento_maximo) * 100).toFixed(0)}%</span></div>
              ` : `
                <div class="pol-row"><span class="k">Score mín</span><span class="v">—</span></div>
                <div class="pol-row"><span class="k">Renda mín</span><span class="v">—</span></div>
                <div class="pol-row"><span class="k">Comprom. máx</span><span class="v">—</span></div>
              `}
            </div>
            <div class="pol-card-actions">
              <button class="btn btn-${config ? 'outline' : 'orange'}" data-id="${e.id}" data-nome="${escapeHtml(e.nome)}">
                ${config ? 'Editar política' : 'Configurar política'}
              </button>
            </div>
          </div>`;
      }).join('');

      grid.querySelectorAll('button[data-id]').forEach(b => {
        b.addEventListener('click', () => abrirModal(b.dataset.id, b.dataset.nome));
      });
    }

    async function abrirModal(empId, empNome){
      empAtual = { id: empId, nome: empNome };
      politicaAtualId = null;
      document.getElementById('modalPolEmp').textContent = empNome;
      limparMsg(document.getElementById('msgPol'));

      // Carrega política existente desse empreendimento
      const { data, error } = await supa
        .from('politicas_credito')
        .select('id, score_minimo, renda_minima, endividamento_maximo, comprometimento_maximo, prazo_validade_dias')
        .eq('empreendimento_id', empId)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) { aviso(document.getElementById('msgPol'), 'Erro ao carregar política: ' + error.message); }

      if (data) {
        politicaAtualId = data.id;
        document.getElementById('fScore').value = data.score_minimo ?? 400;
        document.getElementById('fRenda').value = data.renda_minima ?? 3000;
        document.getElementById('fEndiv').value = data.endividamento_maximo ?? 30000;
        document.getElementById('fComp').value = (Number(data.comprometimento_maximo ?? 0.3) * 100);
        document.getElementById('fPrazo').value = data.prazo_validade_dias ?? 30;
      } else {
        // defaults sugeridos
        document.getElementById('fScore').value = 400;
        document.getElementById('fRenda').value = 3000;
        document.getElementById('fEndiv').value = 30000;
        document.getElementById('fComp').value = 30;
        document.getElementById('fPrazo').value = 30;
      }

      document.getElementById('modalPol').classList.add('show');
    }

    function fecharModalPol(){ document.getElementById('modalPol').classList.remove('show'); }
    window.fecharModalPol = fecharModalPol;

    document.getElementById('btnSalvarPol').addEventListener('click', async () => {
      if (!empAtual) return;
      const msgEl = document.getElementById('msgPol');
      limparMsg(msgEl);

      const score = parseInt(document.getElementById('fScore').value, 10);
      const renda = parseFloat(document.getElementById('fRenda').value);
      const endiv = parseFloat(document.getElementById('fEndiv').value);
      const comp = parseFloat(document.getElementById('fComp').value);
      const prazo = parseInt(document.getElementById('fPrazo').value, 10);

      if ([score, renda, endiv, comp, prazo].some(Number.isNaN)) {
        aviso(msgEl, 'Preencha todos os campos corretamente.');
        return;
      }

      const payload = {
        incorporadora_id: incorp.id,
        empreendimento_id: empAtual.id,
        score_minimo: score,
        renda_minima: renda,
        endividamento_maximo: endiv,
        comprometimento_maximo: comp / 100,
        prazo_validade_dias: prazo,
      };

      const btn = document.getElementById('btnSalvarPol');
      btn.disabled = true; btn.textContent = 'Salvando…';

      const resp = politicaAtualId
        ? await supa.from('politicas_credito').update(payload).eq('id', politicaAtualId).select('id').single()
        : await supa.from('politicas_credito').insert(payload).select('id').single();

      btn.disabled = false; btn.textContent = 'Salvar política';

      if (resp.error) { aviso(msgEl, 'Erro ao salvar: ' + resp.error.message); return; }
      politicaAtualId = resp.data.id;
      aviso(msgEl, 'Política salva com sucesso.', 'ok');

      setTimeout(() => { fecharModalPol(); carregar(); }, 800);
    });

    (async () => {
      const user = await window.exigirLogin();
      if (!user) return;
      window.preencherUsuarioSidebar(user);
      incorp = await window.buscarIncorporadoraDoUsuario(user);
      if (!incorp) {
        grid.innerHTML = '';
        aviso(msgGlobal, 'Conta sem incorporadora vinculada. Configure sua conta no onboarding.', 'err');
        return;
      }
      await carregar();
    })();
  </script>
</body>
</html>
