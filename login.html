<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — GATEONE</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <main class="auth-wrap">
    <div class="auth-card">
      <a class="logo" href="index.html"><span class="gate">GATE</span><span class="one">ONE</span></a>
      <h1>Acesso do gestor</h1>
      <p class="lead">Entre para acompanhar análises de crédito da sua incorporadora.</p>

      <form id="formLogin" class="form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required placeholder="voce@incorporadora.com.br" />
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input id="senha" type="password" autocomplete="current-password" required minlength="6" />
        </div>
        <button id="btnEntrar" type="submit" class="btn btn-primary btn-block">Entrar</button>
        <div id="msg" class="msg"></div>
      </form>

      <div class="divider">ou</div>

      <button id="btnGoogle" type="button" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 8 3l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 8 3l5.7-5.7C34.5 7.1 29.5 5 24 5 16.3 5 9.6 9.5 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.3l-6.3-5.2C29.3 35 26.8 36 24 36c-5.3 0-9.7-3-11.3-7.4l-6.6 5.1C9.5 39.4 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.4l6.3 5.2c-.4.4 6.4-4.7 6.4-14.6 0-1.2-.1-2.4-.4-3.5z"/></svg>
        Entrar com Google
      </button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    const supa = window.gateoneSupabase;
    const msg = document.getElementById('msg');

    function mostrarErro(texto) {
      msg.textContent = texto;
      msg.className = 'msg err show';
    }

    // Se já logado, manda direto pro dashboard
    (async () => {
      const { data } = await supa.auth.getSession();
      if (data.session) window.location.replace('dashboard.html');
    })();

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btnEntrar');
      btn.disabled = true; btn.textContent = 'Entrando...';
      const { error } = await supa.auth.signInWithPassword({ email, password: senha });
      if (error) {
        btn.disabled = false; btn.textContent = 'Entrar';
        mostrarErro(error.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' : error.message);
        return;
      }
      window.location.replace('dashboard.html');
    });

    document.getElementById('btnGoogle').addEventListener('click', async () => {
      const redirectTo = `${window.location.origin}/dashboard.html`;
      const { error } = await supa.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
      if (error) mostrarErro(error.message);
    });
  </script>
</body>
</html>
